{% extends "base.html" %}

{% block content %}

<h2>Checkout</h2>

<table class="table">
<thead>
    <tr>
        <th>Product</th>
        <th>Quantity</th>
        <th>Price</th>
    </tr>
</thead>
<tbody>
{% for item in items %}
<tr>
    <td>{{ item.product.name }}</td>
    <td>{{ item.quantity }}</td>
    <td>₹{{ item.subtotal }}</td>
</tr>
{% endfor %}
</tbody>
</table>

<h3>Total: ₹{{ total }}</h3>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Place Order</button>
</form>

{% endblock %}
