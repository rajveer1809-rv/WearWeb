{% extends "base.html" %}

{% block content %}

<div class="auth-wrapper">
<div class="glass-card">

<h2 class="text-center mb-3">
Verify OTP
</h2>

<p class="text-center mb-3">Enter the 6-digit code sent to {{ email }}</p>

<form method="POST">
{% csrf_token %}

{% if form.errors %}
<div class="alert alert-danger">
Invalid OTP
</div>
{% endif %}

<div class="mb-3">
<label>OTP Code</label>
{{ form.otp_code }}
</div>

<button type="submit" class="btn btn-primary w-100">
Verify & Login
</button>

</form>

</div>
</div>

{% endblock %}
