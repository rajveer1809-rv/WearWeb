{% extends "base.html" %}

{% block title %}Contact Us{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-bold mb-6 text-center">Contact Us</h1>

    <form method="POST" class="bg-white shadow-md rounded-lg p-6 space-y-4">
        {% csrf_token %}

        <div>
            <label class="block mb-1 font-semibold">Name</label>
            <input type="text" name="name" required
                   class="w-full border rounded px-3 py-2">
        </div>

        <div>
            <label class="block mb-1 font-semibold">Email</label>
            <input type="email" name="email" required
                   class="w-full border rounded px-3 py-2">
        </div>

        <div>
            <label class="block mb-1 font-semibold">Message</label>
            <textarea name="message" rows="4" required
                      class="w-full border rounded px-3 py-2"></textarea>
        </div>

        <button type="submit"
                class="bg-black text-white px-6 py-2 rounded hover:bg-gray-800">
            Send Message
        </button>
    </form>

    <!-- Optional Info -->
    <div class="mt-8 text-center text-gray-600">
        <p>Email: support@wearweb.com</p>
        <p>Phone: +91 9876543210</p>
    </div>
</div>

{% endblock %}
