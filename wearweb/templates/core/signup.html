{% extends "base.html" %}

{% block content %}

<div class="auth-wrapper">
<div class="glass-card">

<h2 class="text-center mb-3">Signup</h2>

<form method="POST">

{% csrf_token %}

{% if form.errors %}
<div class="alert alert-danger">
{{ form.errors }}
</div>
{% endif %}

<div class="mb-3">
<label>Full Name</label>
{{ form.name }}
</div>

<div class="mb-3">
<label>Email</label>
{{ form.email }}
</div>

<div class="mb-3">
<label>Role</label>
{{ form.role }}
</div>

<div class="mb-3">
<label>Password</label>
{{ form.password1 }}
</div>

<div class="mb-3">
<label>Confirm Password</label>
{{ form.password2 }}
</div>

<button type="submit" class="btn btn-primary w-100">
Signup
</button>

</form>

<p class="text-center mt-3">
Already have an account?
<a href="{% url 'login' %}">Login</a>
</p>

</div>
</div>

{% endblock %}
